packages:
  - src/**
  - "!**/test-data/**"
  - "!**/dist/**"

# Shared version expressions (yaml anchors).
# This is a yaml feature and is not interpreted by pnpm directly.
__versions:
  - &react_version ^19.2.6
  - &core_packages_version ^4.6.0-dev.20260518102806
  - &ol_base_packages_version ^1.2.0

# https://pnpm.io/catalogs
catalog:
  # Trails OpenLayers base packages
  # https://github.com/open-pioneer/trails-openlayers-base-packages
  "@open-pioneer/basemap-switcher": *ol_base_packages_version
  "@open-pioneer/coordinate-viewer": *ol_base_packages_version
  "@open-pioneer/geolocation": *ol_base_packages_version
  "@open-pioneer/map-navigation": *ol_base_packages_version
  "@open-pioneer/map-ui-components": *ol_base_packages_version
  "@open-pioneer/map": *ol_base_packages_version
  "@open-pioneer/measurement": *ol_base_packages_version
  "@open-pioneer/overview-map": *ol_base_packages_version
  "@open-pioneer/scale-bar": *ol_base_packages_version
  "@open-pioneer/scale-viewer": *ol_base_packages_version

  # Trails core packages
  # https://github.com/open-pioneer/trails-core-packages
  "@open-pioneer/base-theme": *core_packages_version
  "@open-pioneer/core": *core_packages_version
  "@open-pioneer/chakra-snippets": *core_packages_version
  "@open-pioneer/http": *core_packages_version
  "@open-pioneer/integration": *core_packages_version
  "@open-pioneer/notifier": *core_packages_version
  "@open-pioneer/react-utils": *core_packages_version
  "@open-pioneer/reactivity": *core_packages_version
  "@open-pioneer/runtime": *core_packages_version
  "@open-pioneer/test-utils": *core_packages_version

  # Other dependencies
  "@chakra-ui/react": ^3.34.0
  "@conterra/reactivity-core": ^0.8.5
  "@conterra/reactivity-events": ^0.8.5
  "@emotion/cache": ^11.14.0
  "@emotion/react": ^11.14.0
  "@emotion/styled": ^11.14.1
  "@formatjs/intl": ^4.1.11
  ol: ^10.9.0
  react-dom: *react_version
  react-icons: ^5.6.0
  react-use: ^17.6.0
  react: *react_version

  # Devtools
  "@eslint/js": ^9.39.4
  "@open-pioneer/build-package-cli": ^3.1.0
  "@open-pioneer/build-support": ^3.1.0
  "@open-pioneer/changesets-release-line": ^0.1.0
  "@open-pioneer/check-pnpm-duplicates": ^0.3.2
  "@open-pioneer/vite-plugin-pioneer": ^6.0.0
  "@testing-library/dom": ^10.4.1
  "@testing-library/jest-dom": ^6.9.1
  "@testing-library/react": ^16.3.2
  "@testing-library/user-event": ^14.6.1
  "@types/js-yaml": ^4.0.9
  "@types/node": ^20.19.41
  "@types/react-dom": ^19.2.3
  "@types/react": ^19.2.14
  "@typescript-eslint/parser": ^8.59.3
  "@vitejs/plugin-react": "^6.0.2"
  "typescript-eslint": ^8.59.3
  eslint-config-prettier: ^10.1.8
  eslint-import-resolver-typescript: ^4.4.4
  eslint-plugin-headers: ^1.3.4
  eslint-plugin-import: ^2.32.0
  eslint-plugin-jsx-a11y: ^6.10.2
  eslint-plugin-react-hooks: ^7.1.1
  eslint-plugin-react: ^7.37.5
  eslint-plugin-unused-imports: ^4.4.1
  eslint: ^9.39.4
  fast-glob: ^3.3.3
  handlebars: ^4.7.9
  happy-dom: ^20.9.0
  husky: ^9.1.7
  js-yaml: ^4.1.1
  jsdom: ^29.1.1
  lint-staged: ^17.0.4
  prettier: ^3.8.3
  rimraf: ^6.1.3
  sass: ^1.99.0
  tsx: ^4.22.0
  typedoc: ^0.28.19
  typescript: ^6.0.3
  vite-plugin-eslint: ^1.8.1
  vite: ^8.0.13
  vitest: ^4.1.6

overrides:
  # https://github.com/advisories/GHSA-rf6f-7fwh-wjgh
  "flatted@<=3.4.1": "^3.4.2"

  # https://github.com/advisories/GHSA-3v7f-55p6-f55p
  # https://github.com/advisories/GHSA-c2c7-rcm5-vvqj
  "picomatch@<2.3.2": "^2.3.2"
  "picomatch@>=3.0.0 <3.0.2": "^3.0.2"
  "picomatch@>=4.0.0 <4.0.4": "^4.0.4"

  # https://github.com/advisories/GHSA-j452-xhg8-qg39
  "protocol-buffers-schema@<3.6.1": "^3.6.1"

  # https://github.com/advisories/GHSA-w5hq-g745-h8pq
  "uuid@<14.0.0": "^14.0.0"

  # https://github.com/advisories/GHSA-qx2v-qp2m-jg93
  "postcss@<8.5.10": "^8.5.10"

  # https://github.com/advisories/GHSA-jxxr-4gwj-5jf2
  "brace-expansion@>=5.0.0 <5.0.6": "^5.0.6"

  # https://github.com/advisories/GHSA-58qx-3vcg-4xpx
  "ws@>=8.0.0 <8.20.1": "^8.20.1"

  # We don't actually use the babel plugin.
  # The babel runtime is also not used as a production dependency.
  # See e.g. https://github.com/emotion-js/emotion/issues/2371
  "@emotion/react>@emotion/babel-plugin": "-"
  "@emotion/styled>@emotion/babel-plugin": "-"
  "@emotion/react>@babel/runtime": "-"
  "@emotion/styled>@babel/runtime": "-"

  # Resolve duplicate packages
  "stylis@<4.3.5": ">= 4.3.5"
  "source-map@<0.6.1": ">=0.6.1"
  "csstype@<3.2.3": ">=3.2.3"

  # Ensure patched packages have the expected version (patch was tested with this version):
  "@ark-ui/react": "5.34.1"
  "@zag-js/splitter": "1.35.3"
  "@zag-js/interact-outside": "1.35.3"
  "react-select": "5.10.2"

  # TODO: Remove before release
  # Remove before release
  "@open-pioneer/base-theme": 4.6.0-dev.20260518102806
  "@open-pioneer/core": 4.6.0-dev.20260518102806
  "@open-pioneer/http": 4.6.0-dev.20260518102806
  "@open-pioneer/integration": 4.6.0-dev.20260518102806
  "@open-pioneer/local-storage": 4.6.0-dev.20260518102806
  "@open-pioneer/notifier": 4.6.0-dev.20260518102806
  "@open-pioneer/react-utils": 4.6.0-dev.20260518102806
  "@open-pioneer/reactivity": 4.6.0-dev.20260518102806
  "@open-pioneer/runtime": 4.6.0-dev.20260518102806
  "@open-pioneer/test-utils": 4.6.0-dev.20260518102806
  "@open-pioneer/chakra-snippets": 4.6.0-dev.20260518102806

allowUnusedPatches: true
patchedDependencies:
  # Ensure valid ids for aria-activedescendant and fix touch events in shadow DOM (see https://github.com/JedWatson/react-select/issues/5824)
  "react-select": "patches/react-select.patch"

  # Ensure all portals are mounted under `.pioneer-root` div
  "@ark-ui/react@*": "patches/@ark-ui__react.patch"

  # Fixes cursor when using chakra's splitter (see https://github.com/chakra-ui/zag/pull/3045)
  "@zag-js/splitter@*": "patches/@zag-js__splitter.patch"

  # Fixes 'interact-outside' logic not tabbing between elements within the same shadow dom.
  # Can be removed if https://github.com/chakra-ui/zag/issues/3088 is fixed.
  "@zag-js/interact-outside": patches/@zag-js__interact-outside.patch

# Install older versions by default
resolutionMode: "lowest-direct"

# Configure a release cooldown
minimumReleaseAge: 4320 # 3 days in minutes
minimumReleaseAgeExclude:
  - "@open-pioneer/*"
  - "@conterra/*"

peerDependencyRules:
  allowedVersions:
    # See overrides
    "fdir>picomatch": "*"
    "rollup": "*"

auditConfig:
  ignoreGhsas:
    # https://github.com/advisories/GHSA-f886-m6hf-6m8v CVE-2026-33750
    - GHSA-f886-m6hf-6m8v

# Only run build scripts for allowed packages.
allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  esbuild: true
  # Packages that we don't need to build (even though they have install scripts).
  core-js: false
  unrs-resolver: false

# Do not allow to install packages which trust level has decreased
# (e.g. older version was signed but the version to be installed is not signed)
trustPolicy: no-downgrade
# Exclude packages from trustPolicy that are used in an old (major) version that was published after another signed version
trustPolicyExclude:
  - "@pnpm/lockfile.utils@1004.0.4"
  - "@pnpm/lockfile.fs@1001.1.33"
  - "@pnpm/lockfile.walker@1001.0.27"
  - "@pnpm/lockfile.types@1002.1.1"
  - "@pnpm/lockfile.merger@1001.0.21"
  - "undici-types@6.21.0"
  - "semver@6.3.1"
  - "chokidar@4.0.3"
  - "rollup@2.80.0"

# Workaround for current problems regarding our vite plugin + vite's optimizeDeps feature
shamefullyHoist: true

# Cyclic dependencies are a code smell but should not trigger hard errors in pnpm.
ignoreWorkspaceCycles: true

linkWorkspacePackages: false
strictPeerDependencies: true
